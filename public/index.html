<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fylstore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="shell topbar-inner">
          <div class="topbar-brand">
            <h1>Fylstore</h1>
          </div>

          <div class="topbar-center">
            <div class="search-wrap">
              <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                <path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <input
                type="search"
                id="search"
                placeholder="Search by name or category…"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="topbar-actions">
            <button type="button" class="btn-upload" id="open-upload">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              New upload
            </button>
          </div>
        </div>
      </header>

      <div class="toolbar">
        <div class="shell toolbar-inner">
        <div class="filters" role="group" aria-label="Filter by QC status">
          <button type="button" class="chip active" data-filter="all">All</button>
          <button type="button" class="chip" data-filter="good">Pass QC</button>
          <button type="button" class="chip" data-filter="bad">Fail QC</button>
        </div>
        <select id="category-filter" class="select-control select-filter" aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
        <button type="button" class="btn-secondary btn-sm" id="open-folder-dialog">New folder</button>
        <span id="gallery-count" class="file-count"></span>
        </div>
      </div>

      <main class="main">
        <div class="shell main-inner">
        <nav class="breadcrumb" id="breadcrumb" aria-label="Location"></nav>

        <div id="folders-section" class="folders-section" hidden>
          <h2 class="section-label">Folders</h2>
          <div id="folders-row" class="folders-row"></div>
        </div>

        <h2 id="files-label" class="section-label" hidden>Files</h2>
        <div id="gallery" class="gallery" aria-live="polite"></div>

        <div id="gallery-empty" class="empty-state" hidden>
          <div class="empty-icon" aria-hidden="true">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
              <rect x="8" y="14" width="48" height="36" rx="6" stroke="currentColor" stroke-width="2" />
              <circle cx="24" cy="28" r="4" fill="currentColor" opacity="0.4" />
              <path d="M8 42l14-12 10 8 12-14 12 14" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
          </div>
          <h2>No assets yet</h2>
          <p>Upload marketing images to catalog them for QC review.</p>
          <button type="button" class="btn-secondary" id="empty-upload">Upload your first image</button>
        </div>
        </div>
      </main>
    </div>

    <dialog id="upload-dialog" class="dialog">
      <form id="upload-form" method="dialog" class="dialog-inner">
        <header class="dialog-header">
          <h2>Upload image</h2>
          <button type="button" class="icon-btn" id="close-upload" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </header>

        <div id="drop-zone" class="drop-zone">
          <div class="drop-preview" id="drop-preview" hidden>
            <img id="preview-img" alt="" />
            <button type="button" class="text-btn" id="change-file">Change file</button>
          </div>
          <div class="drop-placeholder" id="drop-placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 16V8m0 0l-3 3m3-3l3 3M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <p><strong>Drop an image</strong> or <span class="linkish">browse</span></p>
            <p class="drop-hint">PNG, JPG, WebP · max 15 MB</p>
          </div>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>Name</span>
            <input
              type="text"
              name="name"
              required
              placeholder="hero-banner-spring"
              autocomplete="off"
            />
          </label>
          <label class="field">
            <span>Category</span>
            <select id="upload-category" class="select-control" required>
              <option value="" disabled selected>Select category</option>
            </select>
          </label>
          <label class="field" id="category-new-field" hidden>
            <span>New category</span>
            <input
              type="text"
              id="category-new-input"
              placeholder="social, email, landing…"
              autocomplete="off"
            />
          </label>
        </div>

        <fieldset class="qc-field">
          <legend>QC expectation</legend>
          <div class="segmented">
            <label class="segment">
              <input type="radio" name="assetQuality" value="good" required />
              <span class="segment-label">
                <span class="dot good"></span>
                Pass QC
              </span>
            </label>
            <label class="segment">
              <input type="radio" name="assetQuality" value="bad" />
              <span class="segment-label">
                <span class="dot bad"></span>
                Fail QC
              </span>
            </label>
          </div>
        </fieldset>

        <input type="file" name="file" id="file-input" accept="image/*" required hidden />

        <footer class="dialog-footer">
          <button type="button" class="btn-ghost" id="cancel-upload">Cancel</button>
          <button type="submit" class="btn-primary" id="submit-upload">Upload</button>
        </footer>
      </form>
    </dialog>

    <dialog id="edit-dialog" class="dialog">
      <form id="edit-form" class="dialog-inner">
        <header class="dialog-header">
          <h2>Edit image</h2>
          <button type="button" class="icon-btn" id="close-edit" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </header>
        <div class="form-grid edit-form-grid">
          <label class="field">
            <span>Name</span>
            <input type="text" id="edit-name" required autocomplete="off" />
          </label>
          <label class="field">
            <span>Category</span>
            <select id="edit-category" class="select-control" required></select>
          </label>
          <label class="field">
            <span>Folder</span>
            <select id="edit-folder" class="select-control">
              <option value="">All files (no folder)</option>
            </select>
          </label>
        </div>
        <fieldset class="qc-field">
          <legend>QC expectation</legend>
          <div class="segmented">
            <label class="segment">
              <input type="radio" name="editAssetQuality" value="good" required />
              <span class="segment-label">
                <span class="dot good"></span>
                Pass QC
              </span>
            </label>
            <label class="segment">
              <input type="radio" name="editAssetQuality" value="bad" />
              <span class="segment-label">
                <span class="dot bad"></span>
                Fail QC
              </span>
            </label>
          </div>
        </fieldset>
        <footer class="dialog-footer">
          <button type="button" class="btn-ghost" id="cancel-edit">Cancel</button>
          <button type="submit" class="btn-primary">Save changes</button>
        </footer>
      </form>
    </dialog>

    <dialog id="folder-dialog" class="dialog">
      <form id="folder-form" class="dialog-inner">
        <header class="dialog-header">
          <h2 id="folder-dialog-title">New folder</h2>
          <button type="button" class="icon-btn" id="close-folder" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </header>
        <label class="field folder-field">
          <span>Folder name</span>
          <input type="text" id="folder-name" required placeholder="e.g. Social ads Q2" autocomplete="off" />
        </label>
        <footer class="dialog-footer">
          <button type="button" class="btn-ghost" id="cancel-folder">Cancel</button>
          <button type="submit" class="btn-primary" id="folder-submit-btn">Create folder</button>
        </footer>
      </form>
    </dialog>

    <dialog id="preview-dialog" class="dialog preview-dialog">
      <div class="preview-inner">
        <button type="button" class="icon-btn preview-close" id="close-preview" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <img id="preview-full" alt="" />
        <div class="preview-meta">
          <h3 id="preview-title"></h3>
          <p id="preview-details"></p>
          <div class="preview-actions">
            <button type="button" class="btn-secondary" id="preview-copy">Copy URL</button>
            <a id="preview-open" class="btn-primary" href="#" target="_blank" rel="noopener">Open file</a>
            <button type="button" class="btn-secondary" id="preview-edit">Edit</button>
            <button type="button" class="btn-secondary" id="preview-move-out" hidden>
              Move out of folder
            </button>
            <button type="button" class="btn-danger" id="preview-delete">Delete</button>
          </div>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="/app.js"></script>
  </body>
</html>
